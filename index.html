<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的音乐</title>
    <meta
      name="description"
      content="一个部署在 GitHub Pages 上的静态网页音乐播放器。"
    />
    <meta name="github-branch" content="main" />
    <meta name="github-owner" content="" />
    <meta name="github-repo" content="" />
    <meta name="github-audio-path" content="audio/tracks" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">GitHub Pages 音乐播放器</p>
          <h1>播放仓库里保存的音频文件。</h1>
          <p class="hero-text">
            把音乐文件放进 <code>audio/tracks/</code>。当站点部署到 GitHub Pages
            后，页面会自动发现这个目录并生成播放列表，无需手动编辑
            <code>audio/playlist.json</code>。
          </p>
        </div>
        <div class="hero-orb" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </header>

      <main class="layout">
        <section class="player-card">
          <div class="player-top">
            <div>
              <p class="section-label">正在播放</p>
              <h2 id="track-title">准备加载</h2>
              <p id="track-artist" class="muted">请将音频文件放入 audio/tracks</p>
            </div>
            <button id="theme-glow" class="ghost-chip" type="button">
              静态站点
            </button>
          </div>

          <div class="art-panel">
            <div class="record">
              <div class="record-inner"></div>
            </div>
            <div class="art-copy">
              <p id="track-album" class="album-text">播放列表</p>
              <div class="visualizer" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
              </div>
            </div>
          </div>

          <div class="timeline">
            <label class="sr-only" for="seek-bar">播放进度</label>
            <input id="seek-bar" type="range" min="0" max="100" value="0" />
            <div class="time-row">
              <span id="current-time">0:00</span>
              <span id="total-time">0:00</span>
            </div>
          </div>

          <div class="controls">
            <button id="shuffle-button" class="ghost-button" type="button" aria-pressed="false">
              随机
            </button>
            <button id="prev-button" class="round-button" type="button" aria-label="上一首">
              &#9664;
            </button>
            <button id="play-button" class="play-button" type="button" aria-label="播放">
              播放
            </button>
            <button id="next-button" class="round-button" type="button" aria-label="下一首">
              &#9654;
            </button>
            <button id="repeat-button" class="ghost-button" type="button" aria-pressed="false">
              单曲循环
            </button>
          </div>

          <div class="utility-row">
            <label class="volume-wrap" for="volume-bar">
              <span>音量</span>
              <input id="volume-bar" type="range" min="0" max="1" step="0.01" value="0.8" />
            </label>
            <button id="autoplay-button" class="ghost-chip" type="button" aria-pressed="false">
              自动播放：关
            </button>
          </div>
        </section>

        <aside class="playlist-card">
          <div class="playlist-head">
            <div>
              <p class="section-label">队列</p>
              <h2>播放列表</h2>
            </div>
            <span id="track-count" class="count-chip">0 首</span>
          </div>
          <p id="playlist-source" class="muted source-note">
            正在等待音频来源。
          </p>
          <div id="playlist-empty" class="empty-state" hidden>
            <p>没有找到可播放的音频文件。</p>
            <p>
              请把文件放到 <code>audio/tracks/</code>。在标准 GitHub Pages 地址下，
              站点部署后会自动发现这些文件。
            </p>
          </div>
          <ol id="playlist" class="playlist" aria-label="音乐播放列表"></ol>
        </aside>
      </main>
    </div>

    <audio id="audio-player" preload="metadata"></audio>
    <script src="./script.js" defer></script>
  </body>
</html>
